<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Введите код авторизации</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; 
                     box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; width: 90%; }
        h1 { color: #0077FF; margin-bottom: 20px; }
        .warning { background: #fff3cd; border: 1px solid #ffc107; padding: 15px; 
                   border-radius: 10px; margin-bottom: 20px; font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; 
                border-radius: 10px; font-size: 14px; }
        .btn { width: 100%; padding: 15px; background: #0077FF; color: white; 
               border: none; border-radius: 10px; font-size: 16px; font-weight: 600; 
               cursor: pointer; }
        .code-example { background: #2d2d2d; color: #f8f8f2; padding: 15px; 
                        border-radius: 8px; font-family: monospace; font-size: 12px; 
                        word-break: break-all; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Введите код авторизации</h1>
        
        <div class="warning">
            ⚠️ <strong>Важно:</strong> VK перенаправит вас на <code>oauth.vk.com/blank.html</code>.
            Скопируйте параметр <code>code=</code> из адресной строки и вставьте ниже.
            Код действует <strong>10 минут</strong> [[1]]!
        </div>
        
        <div class="code-example">
            Пример URL:<br>
            https://oauth.vk.com/blank.html?<strong>code=vk2.a.xf_XibO...</strong>&device_id=...
        </div>
        
        <form action="/submit_code" method="POST">
            <div class="form-group">
                <label for="code">Код авторизации (code=)</label>
                <input type="text" id="code" name="code" required 
                       placeholder="vk2.a.xf_...">
            </div>
            
            <button type="submit" class="btn">🔑 Получить токен</button>
        </form>
        
        <p style="margin-top: 20px; text-align: center;">
            <a href="/" style="color: #0077FF;">← Начать заново</a>
        </p>
    </div>
</body>
</html>
