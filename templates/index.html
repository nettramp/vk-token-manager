<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Token Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white">
    <div class="max-w-2xl mx-auto p-8">
        <h1 class="text-4xl font-bold mb-2 flex items-center gap-3">
            <i class="fa-brands fa-vk text-blue-500"></i> VK Token Manager
        </h1>
        <p class="text-gray-400 mb-8">OAuth 2.1 + PKCE — актуальный способ 2026 года</p>

        <form method="POST" action="/setup" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-1">Client ID</label>
                <input type="text" name="client_id" required
                       class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Secret Key (client_secret)</label>
                <input type="password" name="client_secret" required
                       class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Scope (права)</label>
                <input type="text" name="scope" value="wall,photos,video,email,groups" 
                       class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1">Через запятую, без пробелов</p>
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold text-lg transition">
                Продолжить →
            </button>
        </form>

        <div class="mt-12 text-xs text-gray-500 text-center">
            Приложение полностью соответствует <a href="https://dev.vk.com/ru/api/access-token/authcode-flow-user" class="underline">официальной документации VK ID</a>
        </div>
    </div>
</body>
</html>
