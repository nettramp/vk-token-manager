<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Введите код</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-xl w-full p-8">
        <h1 class="text-3xl font-bold mb-8">🔑 Введите данные из VK</h1>
        
        <a href="{{ auth_url }}" target="_blank"
           class="block w-full bg-blue-600 hover:bg-blue-700 text-center py-6 rounded-3xl text-xl font-semibold mb-8 transition flex items-center justify-center gap-3">
            <i class="fa-brands fa-vk"></i> Открыть авторизацию VK ID
        </a>

        <form method="POST" action="/submit_code" class="space-y-6">
            <input type="hidden" name="client_id" value="{{ client_id }}">
            <input type="hidden" name="code_verifier" value="{{ code_verifier }}">
            <input type="hidden" name="device_id" value="{{ device_id }}">

            <div>
                <label class="block text-sm mb-2">code=...</label>
                <input type="text" name="code" required placeholder="vk2.a.xf_..." 
                       class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-lg font-mono">
            </div>

            <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-semibold text-lg">
                ✅ Получить токены
            </button>
        </form>

        <p class="text-xs text-gray-400 mt-6 text-center">
            device_id и code_verifier уже автоматически подставлены.<br>
            Просто скопируйте <strong>code=...</strong> из адресной строки новой вкладки.
        </p>

        <a href="/" class="text-gray-400 hover:text-white text-sm mt-8 inline-block">← Начать заново</a>
    </div>
</body>
</html>
