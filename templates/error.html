<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ошибка</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; 
                     box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 90%; 
                     text-align: center; }
        h1 { color: #dc3545; margin-bottom: 20px; }
        .error { color: #666; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 15px 40px; background: #0077FF; 
               color: white; text-decoration: none; border-radius: 10px; 
               font-size: 16px; font-weight: 600; transition: background 0.3s; }
        .btn:hover { background: #0066DD; }
    </style>
</head>
<body>
    <div class="container">
        <h1>❌ Ошибка авторизации</h1>
        <p class="error">{{ error }}</p>
        <a href="/" class="btn">Попробовать снова</a>
    </div>
</body>
</html>
