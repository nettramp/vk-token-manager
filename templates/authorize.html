<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация VK ID</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; 
                     box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 550px; width: 90%; 
                     text-align: center; }
        h1 { color: #0077FF; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 15px 40px; background: #0077FF; 
               color: white; text-decoration: none; border-radius: 10px; 
               font-size: 16px; font-weight: 600; transition: background 0.3s; }
        .btn:hover { background: #0066DD; }
        .info { margin-top: 20px; color: #666; font-size: 14px; }
        .warning { background: #fff3cd; border: 1px solid #ffc107; padding: 15px; 
                   border-radius: 10px; margin: 20px 0; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Авторизация VK ID</h1>
        <p>Сейчас вы будете перенаправлены на официальный сайт VK для входа.</p>
        
        <div class="warning">
            ⚠️ <strong>Важно:</strong> После авторизации VK перенаправит на 
            <code>oauth.vk.com/blank.html</code>. Скопируйте параметр <code>code=</code> 
            из адресной строки и вернитесь на сайт для ввода кода.
        </div>
        
        <a href="{{ auth_url }}" class="btn">Авторизоваться через VK ID</a>
        
        <p class="info">Код действует 10 минут [[1]]</p>
    </div>
</body>
</html>
